name: Deploy Naver Maps route proxy

on:
  push:
    branches: [main]
    paths:
      - worker/**
      - wrangler.toml
      - .github/workflows/deploy-route-proxy.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            NAVER_MAP_CLIENT_ID
            NAVER_MAP_CLIENT_SECRET
            OPINET_API_KEY
            ALLOWED_ORIGIN
        env:
          NAVER_MAP_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_MAP_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          OPINET_API_KEY: ${{ secrets.OPINET_API_KEY }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
